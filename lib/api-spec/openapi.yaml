  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List all tours
      parameters:
        - name: destinationCountryId
          in: query
          required: false
          schema:
            type: integer
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
        - name: minDays
          in: query
          required: false
          schema:
            type: integer
        - name: maxDays
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourSummary"

    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  /tours/{id}:
    get:
      operationId: getTour
      tags: [tours]
      summary: Get tour details with images and pricing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tours/{id}/images:
    post:
      operationId: addTourImage
      tags: [tours]
      summary: Add image to tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourImage"

  /tours/{id}/images/{imageId}:
    delete:
      operationId: removeTourImage
      tags: [tours]
      summary: Remove image from tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /tours/{id}/pricing:
    post:
      operationId: setTourPricing
      tags: [tours]
      summary: Set country-specific pricing for a tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourPricingInput"
      responses:
        "200":
          description: Pricing set
          content:
            application/json:
