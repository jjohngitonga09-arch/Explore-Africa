    Tour:
      type: object
      required: [id, title, description, durationDays, destinationCountryId, basePrice, highlights, included, notIncluded, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        destinationCountryId:
          type: integer
        basePrice:
          type: number
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        notIncluded:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    TourSummary:
      type: object
      required: [id, title, description, durationDays, destinationCountryId, basePrice, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        destinationCountryId:
          type: integer
        basePrice:
          type: number
        highlights:
          type: array
          items:
            type: string
        coverImage:
          type: ["string", "null"]
        destinationCountry:
          oneOf:
            - $ref: "#/components/schemas/Country"
            - type: "null"
        createdAt:
          type: string
        updatedAt:
          type: string

    TourDetail:
      type: object
      required: [id, title, description, durationDays, destinationCountryId, basePrice, highlights, included, notIncluded, images, pricing, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        destinationCountryId:
          type: integer
        basePrice:
          type: number
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        notIncluded:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/TourImage"
        pricing:
          type: array
          items:
            $ref: "#/components/schemas/TourPricing"
        destinationCountry:
          oneOf:
            - $ref: "#/components/schemas/Country"
            - type: "null"
        createdAt:
          type: string
        updatedAt:
          type: string

    TourInput:
      type: object
      required: [title, description, durationDays, destinationCountryId, basePrice]
      properties:
        title:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        destinationCountryId:
          type: integer
        basePrice:
          type: number
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        notIncluded:
          type: array
          items:
            type: string

    TourUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        durationDays:
          type: integer
        destinationCountryId:
          type: integer
        basePrice:
          type: number
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        notIncluded:
          type: array
          items:
            type: string

