  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard KPI stats (admin)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/countries/origin:
    get:
      operationId: adminListOriginCountries
      tags: [admin]
      summary: List origin countries (admin)
      responses:
        "200":
          description: Origin countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"
    post:
      operationId: addOriginCountry
      tags: [admin]
      summary: Add origin country (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"

  /admin/countries/destination:
    get:
      operationId: adminListDestinationCountries
      tags: [admin]
      summary: List destination countries (admin)
      responses:
        "200":
          description: Destination countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"
    post:
      operationId: addDestinationCountry
      tags: [admin]
      summary: Add destination country (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"

  /admin/countries/{id}:
    delete:
      operationId: deleteCountry
      tags: [admin]
      summary: Delete a country (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
