    Booking:
      type: object
      required: [id, userId, tourId, originCountryId, numberOfPeople, totalPrice, status, bookingDate]
      properties:
        id:
          type: integer
        userId:
          type: integer
        tourId:
          type: integer
        originCountryId:
          type: integer
        numberOfPeople:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
        bookingDate:
          type: string
        paymentDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    BookingDetail:
      type: object
      required: [id, userId, tourId, originCountryId, numberOfPeople, totalPrice, status, bookingDate]
      properties:
        id:
          type: integer
        userId:
          type: integer
        tourId:
          type: integer
        originCountryId:
          type: integer
        numberOfPeople:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
        bookingDate:
          type: string
        paymentDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        tour:
          oneOf:
            - $ref: "#/components/schemas/TourSummary"
            - type: "null"
        user:
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
        originCountry:
          oneOf:
            - $ref: "#/components/schemas/Country"
            - type: "null"

    BookingInput:
      type: object
      required: [tourId, originCountryId, numberOfPeople]
      properties:
        tourId:
          type: integer
        originCountryId:
          type: integer
        numberOfPeople:
          type: integer
        notes:
          type: string
        passportNumber:
          type: string
        dateOfBirth:
          type: string
        phone:
          type: string
        address:
          type: string
        gender:
          type: string
        occupation:
          type: string
        purposeOfTravel:
          type: string
        maritalStatus:
          type: string
        emergencyContact:
          type: string
        emergencyPhone:
          type: string

    BookingStatusUpdate:
      type: object
      required: [status]
      properties:
