    GalleryImage:
      type: object
      required: [id, imageUrl, sortOrder, createdAt, isVisible, isHeaderImage]
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        caption:
          type: ["string", "null"]
        countryId:
          type: ["integer", "null"]
        country:
          oneOf:
            - $ref: "#/components/schemas/Country"
            - type: "null"
        sortOrder:
          type: integer
        isVisible:
          type: boolean
        isHeaderImage:
          type: boolean
        headerOrder:
          type: ["integer", "null"]
        createdAt:
          type: string

    GalleryImageInput:
      type: object
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
        caption:
          type: string
        countryId:
          type: integer
        sortOrder:
          type: integer

    GalleryImageVisibilityInput:
      type: object
      required: [isVisible]
      properties:
        isVisible:
          type: boolean

    BulkGalleryImageVisibilityInput:
      type: object
      required: [isVisible]
      properties:
        ids:
          type: array
          items:
            type: integer
          description: Image ids to update. Omit to apply to all images.
        isVisible:
          type: boolean

    GalleryImageHeaderInput:
      type: object
      required: [isHeaderImage]
      properties:
        isHeaderImage:
          type: boolean
        headerOrder:
          type: integer
          nullable: true

    SiteSettings:
      type: object
      required: [id, headerCarouselIntervalMs, updatedAt]
      properties:
        id:
          type: integer
        headerCarouselIntervalMs:
          type: integer
        updatedAt:
          type: string

    UpdateSiteSettingsInput:
      type: object
      required: [headerCarouselIntervalMs]
      properties:
        headerCarouselIntervalMs:
