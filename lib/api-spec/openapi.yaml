  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking (user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/mine:
    get:
      operationId: getMyBookings
      tags: [bookings]
      summary: Get current user's bookings
      responses:
        "200":
          description: User bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetail"

  /bookings/{id}/mark-paid:
    post:
      operationId: markBookingPaid
      tags: [bookings]
      summary: Mark booking as paid (user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/admin/all:
    get:
      operationId: getAllBookings
      tags: [bookings]
      summary: Get all bookings (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetail"

  /bookings/admin/{id}:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
