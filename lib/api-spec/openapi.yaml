    VisaService:
      type: object
      required: [id, name, description, fee, destinationCountryId, requirements, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        fee:
          type: number
        destinationCountryId:
          type: integer
        requirements:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        destinationCountry:
          oneOf:
            - $ref: "#/components/schemas/Country"
            - type: "null"
        createdAt:
          type: string

    VisaServiceInput:
      type: object
      required: [name, description, fee, destinationCountryId]
      properties:
        name:
          type: string
        description:
          type: string
        fee:
          type: number
        destinationCountryId:
          type: integer
        requirements:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    VisaServiceUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        fee:
          type: number
        destinationCountryId:
          type: integer
        requirements:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    VisaCase:
      type: object
      required: [id, userId, visaServiceId, status, feePaid, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        visaServiceId:
          type: integer
        status:
          type: string
        feePaid:
          type: boolean
        submittedAt:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string

    VisaCaseDetail:
      type: object
      required: [id, userId, visaServiceId, status, feePaid, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        visaServiceId:
          type: integer
        status:
          type: string
        feePaid:
          type: boolean
        submittedAt:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string
        service:
          oneOf:
            - $ref: "#/components/schemas/VisaService"
            - type: "null"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/CaseDocument"
        user:
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"

    VisaCaseInput:
      type: object
      required: [visaServiceId]
      properties:
        visaServiceId:
          type: integer

    VisaCaseStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
        adminNotes:
          type: string
        paymentInfo:
          type: string

    CaseDocument:
      type: object
      required: [id, visaCaseId, documentType, fileUrl, uploadedAt]
      properties:
        id:
          type: integer
        visaCaseId:
          type: integer
        documentType:
          type: string
        fileUrl:
          type: string
        uploadedAt:
          type: string

    CaseDocumentInput:
      type: object
      required: [documentType, fileUrl]
      properties:
        documentType:
          type: string
