  /visa/services:
    get:
      operationId: listVisaServices
      tags: [visa]
      summary: List available visa services (public)
      responses:
        "200":
          description: Visa services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisaService"

  /visa/cases:
    post:
      operationId: createVisaCase
      tags: [visa]
      summary: Create a visa case (user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisaCaseInput"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisaCase"

  /visa/cases/mine:
    get:
      operationId: getMyVisaCases
      tags: [visa]
      summary: Get current user's visa cases
      responses:
        "200":
          description: User visa cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisaCaseDetail"

  /visa/cases/{id}/documents:
    post:
      operationId: addCaseDocument
      tags: [visa]
      summary: Add document to visa case (user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseDocumentInput"
      responses:
        "201":
          description: Document added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDocument"

  /visa/cases/{id}/mark-fee-paid:
    post:
      operationId: markFeePaid
      tags: [visa]
      summary: Mark visa case fee as paid (user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fee marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisaCase"

  /visa/admin/services:
    post:
      operationId: createVisaService
      tags: [visa]
      summary: Create visa service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisaServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisaService"

  /visa/admin/services/{id}:
    patch:
      operationId: updateVisaService
      tags: [visa]
      summary: Update visa service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisaServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisaService"

  /visa/admin/cases:
    get:
      operationId: getAllVisaCases
      tags: [visa]
      summary: Get all visa cases (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: All visa cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisaCaseDetail"

  /visa/admin/cases/{id}:
    get:
      operationId: getVisaCaseAdmin
      tags: [visa]
      summary: Get single visa case (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visa case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisaCaseDetail"

