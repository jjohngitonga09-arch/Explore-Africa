  /settings:
    get:
      operationId: getSiteSettings
      tags: [gallery]
      summary: Public site settings (e.g. carousel pace)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /gallery/header:
    get:
      operationId: getHeaderGallery
      tags: [gallery]
      summary: Header carousel images (public)
      responses:
        "200":
          description: Header images, in order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"

  /gallery:
    get:
      operationId: getGallery
      tags: [gallery]
      summary: Public gallery images
      responses:
        "200":
          description: Gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"

  /admin/gallery:
    get:
      operationId: getAdminGallery
      tags: [admin]
      summary: All gallery images (admin)
      responses:
        "200":
          description: Gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"
    post:
      operationId: addGalleryImage
      tags: [admin]
      summary: Add gallery image (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /admin/gallery/{id}:
    delete:
      operationId: deleteGalleryImage
      tags: [admin]
      summary: Delete gallery image (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/gallery/{id}/visibility:
    patch:
      operationId: setGalleryImageVisibility
      tags: [admin]
      summary: Set visibility for a single gallery image (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageVisibilityInput"
      responses:
        "200":
          description: Updated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /admin/gallery/{id}/header:
    patch:
      operationId: setGalleryImageHeader
      tags: [admin]
      summary: Set header-carousel inclusion and order for an image (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageHeaderInput"
      responses:
        "200":
          description: Updated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /admin/settings:
    patch:
      operationId: updateSiteSettings
      tags: [admin]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiteSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/gallery/bulk-visibility:
    post:
      operationId: bulkSetGalleryImageVisibility
      tags: [admin]
      summary: Set visibility for multiple gallery images at once (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkGalleryImageVisibilityInput"
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
