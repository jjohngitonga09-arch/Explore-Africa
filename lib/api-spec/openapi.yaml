    RegisterInput:
      type: object
      required: [email, password, fullName, nationality]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        nationality:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    User:
      type: object
      required: [id, email, fullName, nationality, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        nationality:
          type: string
        role:
          type: string
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
